services:
  - type: web
    name: campusmeet-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DEFAULT_UNIVERSITY_CODE
        value: USTED
      - key: CORS_ORIGINS
        value: "*"
      - key: FLASK_ENV
        value: production
